<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafé Paran - ADAPEI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f7f6;
}

header {
  background: #0f766e;
  color: white;
  padding: 20px;
  text-align: center;
}

main {
  max-width: 800px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
}

label {
  display: block;
  margin: 8px 0;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  background: #0f766e;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<header>
<h1>Kafé Paran</h1>
<p>Questionnaire parents — ADAPEI</p>
</header>

<main>

<div class="card">
<h2>1 - Humeur</h2>
<label><input type="checkbox"> Bien</label>
<label><input type="checkbox"> Très bien</label>
<label><input type="checkbox"> Stressé(e)</label>
</div>

<div class="card">
<h2>2 - Famille</h2>
<label><input type="checkbox"> Parent</label>
<label><input type="checkbox"> Grand-parent</label>
<label><input type="checkbox"> Tante / Oncle</label>
<label><input type="checkbox"> Famille d’accueil</label>
</div>

<div class="card">
<h2>3 - Historique</h2>
<label><input type="checkbox"> 1971</label>
<label><input type="checkbox"> 1982</label>
<label><input type="checkbox"> 2001</label>
</div>

<div class="card">
<h2>4 - Perception</h2>
<textarea placeholder="Votre réponse..."></textarea>
<label><input type="checkbox"> Oui</label>
<label><input type="checkbox"> Non</label>
</div>

<div class="card">
<h2>Conclusion</h2>
<textarea placeholder="Votre réponse..."></textarea>
<button>Envoyer</button>
</div>

</main>

</body>
</html>
